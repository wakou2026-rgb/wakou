# Gzip compression for text-based content
gzip on;
gzip_types text/html text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml image/svg+xml;
gzip_comp_level 6;
gzip_vary on;
gzip_min_length 1000;


server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Uncomment below when SSL certificates are configured
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Upload size limit (product images, etc.)

    client_max_body_size 20M;

    # API requests → backend service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long-running API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # WebSocket support (comm room)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Admin SPA → pure-admin static build
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        alias /usr/share/nginx/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https: chrome-extension:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; connect-src 'self' ws: wss: https: http:;";
    }

    # Everything else → Vue SPA static build (served from nginx itself)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback: unknown paths return index.html so Vue Router handles them
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https: chrome-extension:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; connect-src 'self' ws: wss: https: http:;";
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}


