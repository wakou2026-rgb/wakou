services:
  - type: web
    name: wakou-api-test
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    disk:
      name: wakou-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////var/data/wakou.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FORCE_DEMO_SEED
        value: "0"
      - key: CORS_ALLOW_ORIGINS
        value: https://wakou-admin-test.onrender.com
      # SMTP 郵件設定（敏感資料，請在 Render Dashboard 手動填入，不要寫入此檔）
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: wakou2026@gmail.com
      - key: SMTP_APP_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: wakou2026@gmail.com
      - key: NOTIFY_TO_EMAIL
        value: wakou2026@gmail.com
      - key: FRONTEND_BASE_URL
        value: https://wakou-fronted.onrender.com

  - type: static
    name: wakou-admin-test
    rootDir: admin
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm build
    publishPath: dist
    envVars:
      - key: VITE_PUBLIC_PATH
        value: /
      - key: VITE_ROUTER_HISTORY
        value: h5,/
      - key: VITE_API_BASE_URL
        value: https://wakou-api-test.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
